name: CROUS watcher

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (fastest interval GitHub allows for free)
  workflow_dispatch:        # lets you trigger it manually from the Actions tab, for testing

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crous_watcher.py

      - name: Commit updated state file
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add crous_seen_ids.json
          git diff --cached --quiet || git commit -m "update seen listings"
          git push